ProxyRequests Off

# BACKEND_PROXY_URL must be set in Dokploy env vars.
# If both frontend and backend containers share a Docker network, use the
# service name:  BACKEND_PROXY_URL=http://backend
# Otherwise use the public backend URL: BACKEND_PROXY_URL=https://vmsapi.africau.co.zw
#
# ProxyPreserveHost On — backend sees Host: vehicle.africau.co.zw so session
# cookies are scoped to the frontend domain and work for all subsequent
# same-origin requests from user-dashboard.php, etc.
ProxyPreserveHost On

# Outgoing SSL support (used when BACKEND_PROXY_URL is https://)
SSLProxyEngine On
SSLProxyVerify none
SSLProxyCheckPeerCN off
SSLProxyCheckPeerName off
SSLProxyCheckPeerExpire off

# /backend/* → backend API root (strip the /backend prefix)
ProxyPass /backend ${BACKEND_PROXY_URL}/
ProxyPassReverse /backend ${BACKEND_PROXY_URL}/

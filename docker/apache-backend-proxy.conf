ProxyRequests Off

# BACKEND_PROXY_URL must be set in Dokploy env vars.
# Use the internal Docker service name over HTTP — no SSL needed for
# container-to-container traffic (Cloudflare handles public HTTPS):
#   BACKEND_PROXY_URL=http://backend
# If the services are on different networks, use the public URL instead
# (requires SSL — see docs/ssl-proxy.md):
#   BACKEND_PROXY_URL=https://vmsapi.africau.co.zw
#
# ProxyPreserveHost On — backend sees Host: vehicle.africau.co.zw so session
# cookies are scoped to the frontend domain.
ProxyPreserveHost On

# /backend/* → backend API root (strips /backend prefix)
ProxyPass /backend ${BACKEND_PROXY_URL}/
ProxyPassReverse /backend ${BACKEND_PROXY_URL}/
